spring.application.name=backend

# ===== MySQL (Docker: my-mysql, localhost:3306) =====
spring.datasource.url=jdbc:mysql://localhost:3306/okm?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# 엔티티 기준으로 테이블 자동 생성/갱신 (CREATE TABLE 직접 안 짜도 됨)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== 서버 포트 (React=5173 와 구분) =====
server.port=8080
